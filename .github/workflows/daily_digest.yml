name: Daily Research Digest — Multi-Agent Debate in LLMs

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 AM Vietnam (UTC+7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout trước để các bước sau có code ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Kiểm tra API key — in rõ trạng thái vào Step Summary ───────────
      - name: Verify ANTHROPIC_API_KEY
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          KEY_LEN=${#ANTHROPIC_API_KEY}
          echo "## API Key Status" >> $GITHUB_STEP_SUMMARY

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY is EMPTY" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Fix:** Go to [Settings → Secrets → Actions](https://github.com/${{ github.repository }}/settings/secrets/actions)" >> $GITHUB_STEP_SUMMARY
            echo "Add a secret named \`ANTHROPIC_API_KEY\` with value from https://console.anthropic.com/settings/keys" >> $GITHUB_STEP_SUMMARY
            echo "::error title=Missing API Key::ANTHROPIC_API_KEY secret is empty. Add it at: github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          # Kiểm tra format cơ bản: Anthropic keys bắt đầu bằng "sk-ant-"
          if [[ "$ANTHROPIC_API_KEY" != sk-ant-* ]]; then
            echo "⚠️ Key length=${KEY_LEN} but does NOT start with 'sk-ant-'" >> $GITHUB_STEP_SUMMARY
            echo "Key preview: \`${ANTHROPIC_API_KEY:0:10}...\`" >> $GITHUB_STEP_SUMMARY
            echo "::warning::API key format unexpected (should start with sk-ant-). Check the value at console.anthropic.com"
          else
            echo "✅ ANTHROPIC_API_KEY is set (length=${KEY_LEN}, prefix=sk-ant-...)" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 3. Cài Python ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Cache pip ────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2-anthropic-requests-bs4-lxml-ddgs
          restore-keys: pip-v2-

      # ── 5. Cài dependencies ─────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install \
            "anthropic>=0.40.0" \
            "requests>=2.32.0" \
            "beautifulsoup4>=4.12.0" \
            "lxml>=5.0.0" \
            "duckduckgo-search>=6.0.0,<8.0.0"
          echo "Installed versions:"
          pip show anthropic duckduckgo-search beautifulsoup4 lxml | grep -E "^(Name|Version):"

      # ── 6. Chạy agent ───────────────────────────────────────────────────────
      - name: Run daily digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_digest.py

      # ── 7. Commit và push ───────────────────────────────────────────────────
      - name: Commit and push results
        run: |
          git config user.email "agent@claude.ai"
          git config user.name "Claude Agent"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            RUN_DATE=$(TZ='Asia/Ho_Chi_Minh' date +%Y-%m-%d)
            git commit -m "[AUTO] Digest ${RUN_DATE}: multi-agent debate in LLMs"
            git push
          fi
