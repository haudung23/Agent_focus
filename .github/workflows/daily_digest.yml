name: Daily Research Digest — Multi-Agent Debate in LLMs

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  schedule:
    # 01:00 UTC  =  08:00 AM Vietnam (UTC+7)
    - cron: '0 1 * * *'

  # Manual trigger — dùng để test mà không cần chờ 8h sáng
  workflow_dispatch:

# ── Permissions ─────────────────────────────────────────────────────────────
# "contents: write" cho phép workflow commit và push lại vào repo
permissions:
  contents: write

# ── Job ─────────────────────────────────────────────────────────────────────
jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      # 1. Kiểm tra ANTHROPIC_API_KEY trước khi làm bất cứ thứ gì
      #    Nếu secret chưa được thêm vào repo, fail ngay với thông báo rõ ràng
      - name: Check ANTHROPIC_API_KEY secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set!"
            echo "::error::Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: ANTHROPIC_API_KEY  |  Value: your key from console.anthropic.com"
            exit 1
          fi
          echo "✓ ANTHROPIC_API_KEY is set (length=${#ANTHROPIC_API_KEY})"

      # 2. Checkout repo — tự động cấu hình git credentials để push được
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Cài Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Cache pip packages — tránh download lại mỗi ngày
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}-anthropic-bs4-ddgs
          restore-keys: pip-

      # 5. Cài dependencies
      - name: Install Python dependencies
        run: |
          pip install \
            "anthropic>=0.40.0" \
            "requests>=2.32.0" \
            "beautifulsoup4>=4.12.0" \
            "duckduckgo-search>=6.0.0"

      # 6. Chạy Claude agent — tạo file noi_dung_YYYY-MM-DD.md, cập nhật links.txt + README.md
      - name: Run daily digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_digest.py

      # 7. Commit và push kết quả về repo
      - name: Commit and push results
        run: |
          git config user.email "agent@claude.ai"
          git config user.name "Claude Agent"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — no new papers found today."
          else
            RUN_DATE=$(TZ='Asia/Ho_Chi_Minh' date +%Y-%m-%d)
            git commit -m "[AUTO] Digest ${RUN_DATE}: multi-agent debate in LLMs"
            git push
          fi
